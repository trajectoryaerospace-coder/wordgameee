<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mind Meld</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #1a191f;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            height: 88dvh;
            background: #2d2233;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: space-between;
            border: 1px solid #42334a;
        }

        .screen-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            justify-content: center;
        }

        .hidden { display: none !important; }

        h1 { color: #ff8bb6; font-size: 26px; letter-spacing: 0.5px; }
        
        button {
            background: #ff8bb6;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #423845; color: #756a7a; cursor: not-allowed; transform: none; }

        .meta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #131017;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #3d2f44;
        }
        .streak-badge { color: #ff4a7d; display: flex; align-items: center; gap: 4px; }
        .mode-badge { color: #00adb5; text-transform: uppercase; }

        .alert-banner {
            background: #1f1824;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #3d2f44;
        }
        #resultAlert { color: #ffca28; margin-top: 4px; display: block; font-size: 13px;}
        #themeText { color: #00adb5; }
        #timerText { color: #ff4a4a; margin-left: 6px; font-size: 16px; font-weight: bold; }

        .section-title {
            font-size: 12px;
            color: #bfaec4;
            text-align: left;
            padding-left: 2px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grid-box {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-top: 2px;
            max-height: 95px;
            overflow-y: auto;
        }
        .theme-btn, .mode-btn {
            background: #1f1824;
            color: #bfaec4;
            padding: 10px;
            font-size: 12px;
            border: 1px solid #3d2f44;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }
        .theme-btn.active, .mode-btn.active { background: #00adb5; color: #fff; border-color: #00adb5; }
        .mode-btn.active { background: #ff8bb6; border-color: #ff8bb6; }

        .input-style {
            width: 100%;
            padding: 12px;
            background: #131017;
            border: 2px solid #3d2f44;
            color: #fff;
            border-radius: 10px;
            font-size: 15px;
            text-align: center;
            outline: none;
        }
        .input-style:focus { border-color: #ff8bb6; }

        /* Reactions Deck */
        .reaction-deck {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            background: #1f1824;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid #3d2f44;
        }
        .react-btn {
            background: transparent;
            padding: 6px;
            font-size: 18px;
            width: auto;
        }
        .react-btn:active { transform: scale(1.2); }

        .chat-box {
            background: #131017;
            flex-grow: 1;
            height: 90px;
            overflow-y: auto;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid #3d2f44;
        }
        
        .bubble {
            max-width: 80%;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 13px;
            word-break: break-word;
            line-height: 1.4;
        }
        
        .bubble.me { background: #ff8bb6; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.them { background: #00adb5; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .bubble.sys {
            background: rgba(0, 173, 181, 0.1);
            color: #00adb5;
            align-self: center;
            border-radius: 6px;
            font-style: italic;
            font-size: 11px;
            text-align: center;
            max-width: 95%;
        }
        .bubble.react {
            background: transparent;
            font-size: 22px;
            padding: 0;
            border-radius: 0;
        }

        .chat-input-container { display: flex; gap: 6px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <div id="lobbyScreen" class="screen-content">
            <h1>Mind Meld</h1>
            <p style="color: #bfaec4; font-size: 14px;">Sync thoughts with another player. Choose a dynamic gamemode and match your minds!</p>
            <button id="findBtn">Find Opponent</button>
            <p id="loadingText" class="hidden" style="color: #ff8bb6; font-weight: bold;">Searching for a partner...</p>
        </div>

        <div id="gameScreen" class="screen-content hidden">
            <div class="meta-header">
                <span class="mode-badge" id="modeBadge">Classic</span>
                <span class="streak-badge" id="streakBadge">🔥 Streak: 0</span>
            </div>

            <div class="alert-banner">
                <div>Theme: <span id="themeText">---</span><span id="timerContainer" class="hidden"> | Time: <span id="timerText">30</span></span></div>
                <div id="resultAlert">Waiting for connection...</div>
            </div>

            <div id="votingArea" class="hidden">
                <p class="section-title">1. Vote Modifiers:</p>
                <div class="grid-box" id="modesGrid"></div>
                
                <p class="section-title" style="margin-top: 6px;">2. Vote Category Theme:</p>
                <div class="grid-box" id="themesGrid"></div>
            </div>

            <div id="readyArea" class="hidden">
                <p id="statusMsg" style="margin-bottom: 8px; font-size: 14px; color: #bfaec4;">Match Connected!</p>
                <button id="readyBtn">I'm Ready</button>
            </div>

            <div id="typingArea" class="hidden">
                <input type="text" id="wordInput" class="input-style" placeholder="Type your guess here..." autocomplete="off" autocapitalize="off">
            </div>

            <div class="reaction-deck">
                <button class="react-btn" data-emoji="😂">😂</button>
                <button class="react-btn" data-emoji="🤔">🤔</button>
                <button class="react-btn" data-emoji="🔥">🔥</button>
                <button class="react-btn" data-emoji="💀">💀</button>
                <button class="react-btn" data-emoji="👑">👑</button>
            </div>

            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input-container">
                <input type="text" id="chatInput" class="input-style" style="text-align: left; padding: 12px;" placeholder="Send a chat..." autocapitalize="off">
                <button id="sendChatBtn" style="width: auto; padding: 0 16px;">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove, onDisconnect, off } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTd0toQlWRTlFIX3NygDlFxXtMmKttqyw",
            authDomain: "wordgame-f139a.firebaseapp.com",
            projectId: "wordgame-f139a",
            storageBucket: "wordgame-f139a.firebasestorage.app",
            messagingSenderId: "82881953481",
            appId: "1:82881953481:web:5fbf80826d4d864add1718",
            databaseURL: "https://wordgame-f139a-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const THEMES = ["Places", "Objects", "Animals", "Food", "Movies", "Superheroes", "Games", "Colors", "Jobs", "Brands"];
        const MODES = ["Classic", "Lightning", "Mystery"];
        
        let playerId = localStorage.getItem("mm_pid") || "p_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("mm_pid", playerId);

        let matchId = null, playerRole = null, timerInterval = null, currentMatchListener = null;
        let hasSubmitted = false; 

        const lobbyScreen = document.getElementById("lobbyScreen");
        const gameScreen = document.getElementById("gameScreen");
        const findBtn = document.getElementById("findBtn");
        const loadingText = document.getElementById("loadingText");
        const themeText = document.getElementById("themeText");
        const timerContainer = document.getElementById("timerContainer");
        const timerText = document.getElementById("timerText");
        const resultAlert = document.getElementById("resultAlert");
        const themesGrid = document.getElementById("themesGrid");
        const modesGrid = document.getElementById("modesGrid");
        const readyArea = document.getElementById("readyArea");
        const readyBtn = document.getElementById("readyBtn");
        const statusMsg = document.getElementById("statusMsg");
        const typingArea = document.getElementById("typingArea");
        const votingArea = document.getElementById("votingArea");
        const wordInput = document.getElementById("wordInput");
        const chatBox = document.getElementById("chatBox");
        const chatInput = document.getElementById("chatInput");
        const sendChatBtn = document.getElementById("sendChatBtn");
        const streakBadge = document.getElementById("streakBadge");
        const modeBadge = document.getElementById("modeBadge");

        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === false && matchId) {
                handleDisconnection();
            }
        });

        findBtn.onclick = () => {
            findBtn.classList.add("hidden");
            loadingText.classList.remove("hidden");

            const queueRef = ref(db, "queue");
            onDisconnect(ref(db, `queue/${playerId}`)).remove();

            onValue(queueRef, (snap) => {
                if (matchId) return;
                const queue = snap.val();
                if (queue) {
                    const opponent = Object.keys(queue).find(k => k !== playerId);
                    if (opponent) {
                        matchId = `m_${opponent}_${playerId}`;
                        playerRole = "p2";
                        
                        remove(ref(db, `queue/${opponent}`));
                        remove(ref(db, `queue/${playerId}`));

                        set(ref(db, `matches/${matchId}`), {
                            p1: opponent, p2: playerId,
                            currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)],
                            currentMode: "Classic",
                            state: "voting", p1Ready: false, p2Ready: false, streak: 0
                        }).then(() => initMatch());
                    }
                } else {
                    set(ref(db, `queue/${playerId}`), true);
                    playerRole = "p1";
                    listenForMatch();
                }
            }, { onlyOnce: true });
        };

        function listenForMatch() {
            const matchesRef = ref(db, "matches");
            onValue(matchesRef, (snap) => {
                const matches = snap.val();
                if (matches && !matchId) {
                    for (let id in matches) {
                        if (matches[id].p1 === playerId) {
                            matchId = id;
                            remove(ref(db, `queue/${playerId}`));
                            initMatch();
                            break;
                        }
                    }
                }
            });
        }

        function renderVoteInterfaces(votesData, modeVotesData) {
            themesGrid.innerHTML = "";
            modesGrid.innerHTML = "";
            
            const tCounts = {}; THEMES.forEach(t => tCounts[t] = 0);
            const mCounts = {}; MODES.forEach(m => mCounts[m] = 0);

            if (votesData) {
                if (votesData.p1) tCounts[votesData.p1]++;
                if (votesData.p2) tCounts[votesData.p2]++;
            }
            if (modeVotesData) {
                if (modeVotesData.p1) mCounts[modeVotesData.p1]++;
                if (modeVotesData.p2) mCounts[modeVotesData.p2]++;
            }

            MODES.forEach(m => {
                const b = document.createElement("button");
                b.className = "mode-btn";
                if (modeVotesData && modeVotesData[playerRole] === m) b.classList.add("active");
                b.innerText = mCounts[m] > 0 ? `${m} (${mCounts[m]})` : m;
                b.onclick = () => set(ref(db, `matches/${matchId}/modeVotes/${playerRole}`), m);
                modesGrid.appendChild(b);
            });

            THEMES.forEach(t => {
                const b = document.createElement("button");
                b.className = "theme-btn";
                if (votesData && votesData[playerRole] === t) b.classList.add("active");
                b.innerText = tCounts[t] > 0 ? `${t} (${tCounts[t]})` : t;
                b.onclick = () => set(ref(db, `matches/${matchId}/votes/${playerRole}`), t);
                themesGrid.appendChild(b);
            });
        }

        function initMatch() {
            off(ref(db, "matches"));
            onDisconnect(ref(db, `matches/${matchId}`)).remove();

            lobbyScreen.classList.add("hidden");
            gameScreen.classList.remove("hidden");
            renderVoteInterfaces(null, null);

            currentMatchListener = onValue(ref(db, `matches/${matchId}`), (snap) => {
                const data = snap.val();
                if (!data) {
                    handleDisconnection();
                    return;
                }

                // Global Stats Display update
                const currentStreak = data.streak || 0;
                const activeMode = data.currentMode || "Classic";
                streakBadge.innerText = `🔥 Streak: ${currentStreak}`;
                modeBadge.innerText = activeMode;

                if (activeMode === "Mystery" && data.state === "typing") {
                    themeText.innerText = "❓ MYSTERY (No Clues!)";
                } else {
                    themeText.innerText = data.currentTheme;
                }

                renderVoteInterfaces(data.votes, data.modeVotes);

                // Round processing
                if (data.answers?.p1 && data.answers?.p2) {
                    clearInterval(timerInterval);
                    if (data.answers.p1 === data.answers.p2 && data.answers.p1 !== "[nothing]") {
                        resultAlert.innerHTML = `🎉 MIND SYNCED! Both typed: <span style="color:#ff8bb6;">"${data.answers.p1.toUpperCase()}"</span>!`;
                        if (playerRole === "p1" && data.state !== "resetting") {
                            update(ref(db, `matches/${matchId}`), { state: "resetting", streak: currentStreak + 1 });
                            setTimeout(() => {
                                update(ref(db, `matches/${matchId}`), { 
                                    state: "voting", 
                                    currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)], 
                                    p1Ready: false, p2Ready: false, answers: null, votes: null, modeVotes: null
                                });
                            }, 4000);
                        }
                    } else {
                        resultAlert.innerHTML = `❌ Miss! P1: "${data.answers.p1}" | P2: "${data.answers.p2}". Retrying...`;
                        if (playerRole === "p1" && data.state !== "resetting") {
                            update(ref(db, `matches/${matchId}`), { state: "resetting", streak: 0 });
                            setTimeout(() => {
                                update(ref(db, `matches/${matchId}`), { 
                                    state: "waiting", 
                                    p1Ready: false, p2Ready: false, answers: null 
                                });
                            }, 4000);
                        }
                    }
                    return; 
                }

                if (data.state === "voting" || data.state === "waiting") {
                    hasSubmitted = false;
                }

                // Evaluate Votes Sync
                if (data.votes?.p1 && data.votes?.p2 && data.modeVotes?.p1 && data.modeVotes?.p2 && data.state === "voting") {
                    if (playerRole === "p1") {
                        let chosenTheme = data.votes.p1 === data.votes.p2 ? data.votes.p1 : (Math.random() > 0.5 ? data.votes.p1 : data.votes.p2);
                        let chosenMode = data.modeVotes.p1 === data.modeVotes.p2 ? data.modeVotes.p1 : (Math.random() > 0.5 ? data.modeVotes.p1 : data.modeVotes.p2);
                        update(ref(db, `matches/${matchId}`), { currentTheme: chosenTheme, currentMode: chosenMode, state: "waiting", votes: null, modeVotes: null });
                    }
                    return;
                }

                if (data.state === "voting") {
                    resultAlert.innerText = "🗳️ Vote for configuration options!";
                    votingArea.classList.remove("hidden");
                    readyArea.classList.add("hidden");
                    typingArea.classList.add("hidden");
                    timerContainer.classList.add("hidden");
                }

                if (data.state === "waiting") {
                    votingArea.classList.add("hidden");
                    readyArea.classList.remove("hidden");
                    readyBtn.classList.remove("hidden");
                    typingArea.classList.add("hidden");
                    timerContainer.classList.add("hidden");

                    const myReadyStatus = data[`${playerRole}Ready`];
                    readyBtn.disabled = myReadyStatus;
                    statusMsg.innerText = myReadyStatus ? "Waiting for partner..." : `Ready up for ${activeMode} Mode!`;
                    resultAlert.innerText = "⏳ Awaiting matching confirmations.";

                    if (data.p1Ready && data.p2Ready) {
                        if (playerRole === "p1") {
                            let duration = activeMode === "Lightning" ? 10 : 30;
                            runSyncTimer(duration);
                        }
                    }
                }

                if (data.state === "typing") {
                    votingArea.classList.add("hidden");
                    readyArea.classList.add("hidden");
                    typingArea.classList.remove("hidden");
                    timerContainer.classList.remove("hidden");
                    timerText.innerText = data.timer ?? 30;
                    resultAlert.innerText = "🧠 Enter your matching word now!";

                    if (data.timer === 0 && !hasSubmitted) {
                        evaluateRound();
                    }
                }
            });

            // Chat & Reactions Monitor
            onValue(ref(db, `matches/${matchId}/chat`), (snap) => {
                chatBox.innerHTML = "";
                const messages = snap.val();
                if (messages) {
                    Object.values(messages).forEach(m => {
                        const isEmote = m.msg.startsWith("[react]");
                        const cleanMsg = isEmote ? m.msg.replace("[react]", "") : m.msg;
                        
                        let bubbleClass = m.sys ? "sys" : (m.uid === playerId ? "me" : "them");
                        if(isEmote) bubbleClass += " react";

                        const msgDiv = document.createElement("div");
                        msgDiv.className = `bubble ${bubbleClass}`;
                        msgDiv.innerText = cleanMsg;
                        chatBox.appendChild(msgDiv);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        readyBtn.onclick = () => {
            const upd = {}; upd[`${playerRole}Ready`] = true;
            update(ref(db, `matches/${matchId}`), upd);
        };

        function runSyncTimer(duration) {
            let count = duration;
            update(ref(db, `matches/${matchId}`), { state: "typing", timer: count });
            timerInterval = setInterval(() => {
                count--;
                if (count >= 0) {
                    update(ref(db, `matches/${matchId}`), { timer: count });
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function evaluateRound() {
            hasSubmitted = true; 
            const typedVal = wordInput.value.trim().toLowerCase() || "[nothing]";
            wordInput.value = "";
            wordInput.blur(); 

            set(ref(db, `matches/${matchId}/answers/${playerRole}`), typedVal);
        }

        function handleDisconnection() {
            clearInterval(timerInterval);
            if (currentMatchListener) off(ref(db, `matches/${matchId}`));
            resultAlert.innerText = "⚠️ Connection lost or partner left! Reloading...";
            setTimeout(() => location.reload(), 2000);
        }

        // Setup Reaction buttons
        document.querySelectorAll(".react-btn").forEach(btn => {
            btn.onclick = () => {
                const emo = btn.getAttribute("data-emoji");
                push(ref(db, `matches/${matchId}/chat`), { uid: playerId, msg: `[react]${emo}`, sys: false });
            };
        });

        sendChatBtn.onclick = postChat;
        chatInput.onkeypress = (e) => { if (e.key === "Enter") postChat(); };
        function postChat() {
            const m = chatInput.value.trim();
            if(!m) return;
            push(ref(db, `matches/${matchId}/chat`), { uid: playerId, msg: m, sys: false });
            chatInput.value = "";
        }
    </script>
</body>
</html>
