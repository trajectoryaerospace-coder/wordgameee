<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mind Meld</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #1a191f;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            height: 92vh;
            height: 88dvh;
            background: #2d2233;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: space-between;
            border: 1px solid #42334a;
        }

        .screen-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            justify-content: center;
        }

        .hidden { display: none !important; }

        h1 { color: #ff8bb6; font-size: 26px; letter-spacing: 0.5px; }
        
        button {
            background: #ff8bb6;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #423845; color: #756a7a; cursor: not-allowed; transform: none; }

        .meta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #131017;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #3d2f44;
        }
        .streak-badge { color: #ff4a7d; display: flex; align-items: center; gap: 4px; }
        .mode-badge { color: #00adb5; text-transform: uppercase; }

        .alert-banner {
            background: #1f1824;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #3d2f44;
        }
        #resultAlert { color: #ffca28; margin-top: 4px; display: block; font-size: 13px;}
        #themeText { color: #00adb5; }
        #timerText { color: #ff4a4a; margin-left: 6px; font-size: 16px; font-weight: bold; }

        .section-title {
            font-size: 11px;
            color: #bfaec4;
            text-align: left;
            padding-left: 2px;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grid-box {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            margin-top: 2px;
            max-height: 95px;
            overflow-y: auto;
        }
        .grid-box.three-cols {
            grid-template-columns: repeat(3, 1fr);
        }
        .theme-btn, .mode-btn, .time-btn {
            background: #1f1824;
            color: #bfaec4;
            padding: 8px;
            font-size: 11px;
            border: 1px solid #3d2f44;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-weight: 500;
        }
        .theme-btn.active, .mode-btn.active, .time-btn.active { background: #00adb5; color: #fff; border-color: #00adb5; }
        .mode-btn.active { background: #ff8bb6; border-color: #ff8bb6; }
        .mode-btn.normal-mode-highlight { border-color: #ffca28; color: #ffca28; }
        .mode-btn.normal-mode-highlight.active { background: #ffca28; color: #131017; border-color: #ffca28; }
        .time-btn.active { background: #ffca28; border-color: #ffca28; color: #131017; }

        .input-style {
            width: 100%;
            padding: 12px;
            background: #131017;
            border: 2px solid #3d2f44;
            color: #fff;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        .input-style:focus { border-color: #ff8bb6; }

        #wordInput { text-align: center; }
        #chatInput { text-align: left; }

        /* Connect 4 Board */
        #c4Area {
            background: #1a1520;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #42334a;
        }
        .c4-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            background: #241b2e;
            padding: 8px;
            border-radius: 10px;
            max-width: 270px;
            margin: 0 auto;
            overflow: hidden;
        }
        .c4-slot {
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: #131017;
            border: 1px solid #3d2f44;
            position: relative;
        }
        .c4-slot.p1 { background: #ff8bb6; box-shadow: 0 0 8px #ff8bb6; }
        .c4-slot.p2 { background: #00adb5; box-shadow: 0 0 8px #00adb5; }
        .c4-slot.empty { cursor: pointer; transition: background 0.15s, transform 0.1s; }
        .c4-slot.empty:active { transform: scale(0.9); }
        .c4-slot.winning-highlight { background: #ffca28 !important; box-shadow: 0 0 14px #ffca28 !important; border-color: #fff !important; }

        /* Chess Board Styles */
        #chessArea {
            background: #1a1520;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #42334a;
        }
        .chess-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background: #131017;
            border: 2px solid #3d2f44;
            max-width: 280px;
            margin: 0 auto;
            border-radius: 6px;
            overflow: hidden;
        }
        .chess-square {
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .chess-square.light { background: #e9edcc; color: #779556; }
        .chess-square.dark { background: #779556; color: #e9edcc; }
        .chess-square.selected { background: #ffca28 !important; }
        .chess-square.valid-dest::after {
            content: "";
            width: 10px;
            height: 10px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            position: absolute;
        }
        .chess-controls {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }
        .chess-ctrl-btn {
            font-size: 11px;
            padding: 6px;
            background: #3d2f44;
        }

        /* Reactions Panel */
        .reaction-deck {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            background: #1f1824;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid #3d2f44;
        }
        .react-btn {
            background: transparent;
            padding: 4px;
            font-size: 17px;
            width: auto;
        }
        .react-btn:active { transform: scale(1.2); }

        .chat-box {
            background: #131017;
            flex-grow: 1;
            height: 70px;
            overflow-y: auto;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid #3d2f44;
        }
        
        .bubble {
            max-width: 80%;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 13px;
            word-break: break-word;
            line-height: 1.4;
        }
        
        .bubble.me { background: #ff8bb6; color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.them { background: #00adb5; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .bubble.sys {
            background: rgba(0, 173, 181, 0.1);
            color: #00adb5;
            align-self: center;
            border-radius: 6px;
            font-style: italic;
            font-size: 11px;
            text-align: center;
            max-width: 95%;
        }
        .bubble.react { background: transparent; font-size: 22px; padding: 0; border-radius: 0; }
        .chat-input-container { display: flex; gap: 6px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <div id="lobbyScreen" class="screen-content">
            <h1>Mind Meld</h1>
            <p style="color: #bfaec4; font-size: 14px;">Sync thoughts with another player. Choose a dynamic gamemode and match your minds!</p>
            <button id="findBtn">Find Opponent</button>
            <p id="loadingText" class="hidden" style="color: #ff8bb6; font-weight: bold;">Searching for a partner...</p>
        </div>

        <div id="gameScreen" class="screen-content hidden">
            <div class="meta-header">
                <span class="mode-badge" id="modeBadge">Classic</span>
                <span class="streak-badge" id="streakBadge">🔥 Streak: 0</span>
            </div>

            <div class="alert-banner">
                <div id="bannerThemeInfo">Theme: <span id="themeText">---</span><span id="timerContainer" class="hidden"> | Time: <span id="timerText">30</span></span></div>
                <div id="resultAlert">Waiting for connection...</div>
            </div>

            <div id="c4Area" class="hidden">
                <p id="c4Status" style="font-size: 13px; color: #ffca28; margin-bottom: 6px; font-weight: bold;"></p>
                <div class="c4-grid" id="c4BoardDisplay"></div>
            </div>

            <div id="chessArea" class="hidden">
                <p id="chessStatus" style="font-size: 13px; color: #ffca28; margin-bottom: 4px; font-weight: bold;"></p>
                <div class="chess-grid" id="chessBoardDisplay"></div>
                <div class="chess-controls">
                    <button class="chess-ctrl-btn" id="chessUndoBtn">Request Undo</button>
                    <button class="chess-ctrl-btn hidden" id="chessGrantUndoBtn" style="background: #4caf50;">Grant Undo</button>
                    <button class="chess-ctrl-btn" id="chessResignBtn" style="background: #f44336;">Resign</button>
                </div>
            </div>

            <div id="votingArea" class="hidden">
                <p class="section-title">1. Vote Modifiers:</p>
                <div class="grid-box" id="modesGrid"></div>
                
                <p class="section-title" id="timerSectionTitle">2. Vote Round Timer (Seconds):</p>
                <div class="grid-box three-cols" id="timesGrid"></div>

                <p class="section-title" id="themeSectionTitle">3. Vote Category Theme:</p>
                <div class="grid-box" id="themesGrid"></div>
            </div>

            <div id="readyArea" class="hidden">
                <p id="statusMsg" style="margin-bottom: 8px; font-size: 14px; color: #bfaec4;">Match Connected!</p>
                <button id="readyBtn">I'm Ready</button>
            </div>

            <div id="typingArea" class="hidden">
                <input type="text" id="wordInput" class="input-style" placeholder="Type your guess here..." autocomplete="off" autocapitalize="off">
            </div>

            <div class="reaction-deck">
                <button class="react-btn" data-emoji="❤️">❤️</button>
                <button class="react-btn" data-emoji="😘">😘</button>
                <button class="react-btn" data-emoji="😂">😂</button>
                <button class="react-btn" data-emoji="🤔">🤔</button>
                <button class="react-btn" data-emoji="🔥">🔥</button>
                <button class="react-btn" data-emoji="💀">💀</button>
                <button class="react-btn" data-emoji="👑">👑</button>
            </div>

            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input-container">
                <input type="text" id="chatInput" class="input-style" placeholder="Send a chat..." autocapitalize="off">
                <button id="sendChatBtn" style="width: auto; padding: 0 16px;">Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, remove, onDisconnect, off } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDTd0toQlWRTlFIX3NygDlFxXtMmKttqyw",
            authDomain: "wordgame-f139a.firebaseapp.com",
            projectId: "wordgame-f139a",
            storageBucket: "wordgame-f139a.firebasestorage.app",
            messagingSenderId: "82881953481",
            appId: "1:82881953481:web:5fbf80826d4d864add1718",
            databaseURL: "https://wordgame-f139a-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const THEMES = ["Places", "Objects", "Animals", "Food", "Movies", "Superheroes", "Games", "Colors", "Jobs", "Brands"];
        const MODES = ["Classic", "Lightning", "Mystery", "Connect 4", "Normal Connect 4", "Chess", "Normal Chess"];
        const TIMES = [10, 20, 30];

        const PIECES = {
            'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚', 'P': '♟',
            'r': '♖', 'n': '♘', 'b': '♗', 'q': '♕', 'k': '♔', 'p': '♙',
            '.': ''
        };
        const INITIAL_CHESS = [
            'r','n','b','q','k','b','n','r',
            'p','p','p','p','p','p','p','p',
            '.','.','.','.','.','.','.','.',
            '.','.','.','.','.','.','.','.',
            '.','.','.','.','.','.','.','.',
            '.','.','.','.','.','.','.','.',
            'P','P','P','P','P','P','P','P',
            'R','N','B','Q','K','B','N','R'
        ];
        
        let playerId = localStorage.getItem("mm_pid") || "p_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("mm_pid", playerId);

        let matchId = null, playerRole = null, timerInterval = null, currentMatchListener = null;
        let hasSubmitted = false, selectedSquare = null, validDestinations = [];
        window.c4DelayTimeout = null; window.c4CountdownInterval = null;
        window.chessDelayTimeout = null; window.chessCountdownInterval = null;

        const lobbyScreen = document.getElementById("lobbyScreen");
        const gameScreen = document.getElementById("gameScreen");
        const findBtn = document.getElementById("findBtn");
        const loadingText = document.getElementById("loadingText");
        const themeText = document.getElementById("themeText");
        const timerContainer = document.getElementById("timerContainer");
        const timerText = document.getElementById("timerText");
        const resultAlert = document.getElementById("resultAlert");
        const themesGrid = document.getElementById("themesGrid");
        const modesGrid = document.getElementById("modesGrid");
        const timesGrid = document.getElementById("timesGrid");
        const readyArea = document.getElementById("readyArea");
        const readyBtn = document.getElementById("readyBtn");
        const statusMsg = document.getElementById("statusMsg");
        const typingArea = document.getElementById("typingArea");
        const votingArea = document.getElementById("votingArea");
        const c4Area = document.getElementById("c4Area");
        const c4Status = document.getElementById("c4Status");
        const c4BoardDisplay = document.getElementById("c4BoardDisplay");
        const chessArea = document.getElementById("chessArea");
        const chessStatus = document.getElementById("chessStatus");
        const chessBoardDisplay = document.getElementById("chessBoardDisplay");
        const chessUndoBtn = document.getElementById("chessUndoBtn");
        const chessGrantUndoBtn = document.getElementById("chessGrantUndoBtn");
        const chessResignBtn = document.getElementById("chessResignBtn");
        const wordInput = document.getElementById("wordInput");
        const chatBox = document.getElementById("chatBox");
        const chatInput = document.getElementById("chatInput");
        const sendChatBtn = document.getElementById("sendChatBtn");
        const streakBadge = document.getElementById("streakBadge");
        const modeBadge = document.getElementById("modeBadge");
        const timerSectionTitle = document.getElementById("timerSectionTitle");
        const themeSectionTitle = document.getElementById("themeSectionTitle");
        const bannerThemeInfo = document.getElementById("bannerThemeInfo");

        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => { if (snap.val() === false && matchId) handleDisconnection(); });

        findBtn.onclick = () => {
            findBtn.classList.add("hidden"); loadingText.classList.remove("hidden");
            const queueRef = ref(db, "queue");
            onDisconnect(ref(db, `queue/${playerId}`)).remove();

            onValue(queueRef, (snap) => {
                if (matchId) return;
                const queue = snap.val();
                if (queue) {
                    const opponent = Object.keys(queue).find(k => k !== playerId);
                    if (opponent) {
                        matchId = `m_${opponent}_${playerId}`; playerRole = "p2";
                        remove(ref(db, `queue/${opponent}`)); remove(ref(db, `queue/${playerId}`));

                        set(ref(db, `matches/${matchId}`), {
                            p1: opponent, p2: playerId,
                            currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)],
                            currentMode: "Classic", customDuration: 30,
                            state: "voting", p1Ready: false, p2Ready: false, streak: 0,
                            c4Board: Array(42).fill("empty"), c4Turn: "p1",
                            chessBoard: INITIAL_CHESS, chessTurn: "p1", chessMovesLeft: 0, undoRequested: "",
                            lastSyncResult: ""
                        }).then(() => initMatch());
                    }
                } else {
                    set(ref(db, `queue/${playerId}`), true); playerRole = "p1"; listenForMatch();
                }
            }, { onlyOnce: true });
        };

        function listenForMatch() {
            onValue(ref(db, "matches"), (snap) => {
                const matches = snap.val();
                if (matches && !matchId) {
                    for (let id in matches) {
                        if (matches[id].p1 === playerId) {
                            matchId = id; remove(ref(db, `queue/${playerId}`)); initMatch(); break;
                        }
                    }
                }
            });
        }

        function renderVoteInterfaces(votesData, modeVotesData, timeVotesData) {
            themesGrid.innerHTML = ""; modesGrid.innerHTML = ""; timesGrid.innerHTML = "";
            const tCounts = {}, mCounts = {}, tmCounts = {};
            THEMES.forEach(t => tCounts[t] = 0); MODES.forEach(m => mCounts[m] = 0); TIMES.forEach(tm => tmCounts[tm] = 0);

            if (votesData) { if (votesData.p1) tCounts[votesData.p1]++; if (votesData.p2) tCounts[votesData.p2]++; }
            if (modeVotesData) { if (modeVotesData.p1) mCounts[modeVotesData.p1]++; if (modeVotesData.p2) mCounts[modeVotesData.p2]++; }
            if (timeVotesData) { if (timeVotesData.p1) tmCounts[timeVotesData.p1]++; if (timeVotesData.p2) tmCounts[timeVotesData.p2]++; }

            MODES.forEach(m => {
                const b = document.createElement("button");
                b.className = "mode-btn";
                if (m.startsWith("Normal ")) b.classList.add("normal-mode-highlight");
                if (modeVotesData && modeVotesData[playerRole] === m) b.classList.add("active");
                b.innerText = mCounts[m] > 0 ? `${m} (${mCounts[m]})` : m;
                b.onclick = () => set(ref(db, `matches/${matchId}/modeVotes/${playerRole}`), m);
                modesGrid.appendChild(b);
            });

            TIMES.forEach(tm => {
                const b = document.createElement("button"); b.className = "time-btn";
                if (timeVotesData && timeVotesData[playerRole] === tm) b.classList.add("active");
                b.innerText = tmCounts[tm] > 0 ? `${tm}s (${tmCounts[tm]})` : `${tm}s`;
                b.onclick = () => set(ref(db, `matches/${matchId}/timeVotes/${playerRole}`), tm);
                timesGrid.appendChild(b);
            });

            THEMES.forEach(t => {
                const b = document.createElement("button"); b.className = "theme-btn";
                if (votesData && votesData[playerRole] === t) b.classList.add("active");
                b.innerText = tCounts[t] > 0 ? `${t} (${tCounts[t]})` : t;
                b.onclick = () => set(ref(db, `matches/${matchId}/votes/${playerRole}`), t);
                themesGrid.appendChild(b);
            });
        }

        function isWhitePiece(char) { return char !== '.' && char === char.toUpperCase(); }
        function isBlackPiece(char) { return char !== '.' && char === char.toLowerCase(); }
        
        function generateValidMoves(idx, board) {
            const moves = []; const piece = board[idx]; if (piece === '.') return moves;
            const r = Math.floor(idx / 8), c = idx % 8;
            const isWhite = isWhitePiece(piece);
            const myPiece = (checkIdx) => isWhite ? isWhitePiece(board[checkIdx]) : isBlackPiece(board[checkIdx]);
            const oppPiece = (checkIdx) => isWhite ? isBlackPiece(board[checkIdx]) : isWhitePiece(board[checkIdx]);

            if (piece.toUpperCase() === 'P') {
                const dir = isWhite ? -1 : 1; const startRow = isWhite ? 6 : 1;
                const f1 = (r + dir) * 8 + c;
                if (r + dir >= 0 && r + dir < 8 && board[f1] === '.') {
                    moves.push(f1);
                    const f2 = (r + 2 * dir) * 8 + c;
                    if (r === startRow && board[f2] === '.') moves.push(f2);
                }
                for (let dc of [-1, 1]) {
                    if (c + dc >= 0 && c + dc < 8) {
                        const capIdx = (r + dir) * 8 + (c + dc);
                        if (oppPiece(capIdx)) moves.push(capIdx);
                    }
                }
            } else if (piece.toUpperCase() === 'N') {
                const offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
                for (let [dr, dc] of offsets) {
                    if (r+dr>=0 && r+dr<8 && c+dc>=0 && c+dc<8) {
                        const target = (r+dr)*8 + (c+dc);
                        if (!myPiece(target)) moves.push(target);
                    }
                }
            } else if (piece.toUpperCase() === 'B' || piece.toUpperCase() === 'R' || piece.toUpperCase() === 'Q') {
                const dirs = [];
                if (piece.toUpperCase() === 'B' || piece.toUpperCase() === 'Q') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
                if (piece.toUpperCase() === 'R' || piece.toUpperCase() === 'Q') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
                for (let [dr, dc] of dirs) {
                    let currR = r + dr, currC = c + dc;
                    while (currR >= 0 && currR < 8 && currC >= 0 && currC < 8) {
                        const target = currR * 8 + currC;
                        if (board[target] === '.') { moves.push(target); }
                        else { if (oppPiece(target)) moves.push(target); break; }
                        currR += dr; currC += dc;
                    }
                }
            } else if (piece.toUpperCase() === 'K') {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        if (r+dr>=0 && r+dr<8 && c+dc>=0 && c+dc<8) {
                            const target = (r+dr)*8 + (c+dc);
                            if (!myPiece(target)) moves.push(target);
                        }
                    }
                }
            }
            return moves;
        }

        function checkKingMissing(board) {
            let whiteKing = board.includes('K'), blackKing = board.includes('k');
            if (!whiteKing) return 'p2'; if (!blackKing) return 'p1';
            return null;
        }

        function renderChessBoard(boardArray, interactive) {
            chessBoardDisplay.innerHTML = "";
            boardArray.forEach((cell, i) => {
                const sq = document.createElement("div");
                const r = Math.floor(i / 8), c = i % 8;
                sq.className = `chess-square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                sq.innerText = PIECES[cell] || '';
                
                if (selectedSquare === i) sq.classList.add("selected");
                if (validDestinations.includes(i)) sq.classList.add("valid-dest");

                if (interactive) {
                    sq.onclick = () => {
                        const isWhiteTurn = (playerRole === "p1");
                        if (validDestinations.includes(i) && selectedSquare !== null) {
                            let movingPiece = boardArray[selectedSquare];
                            const nextBoard = [...boardArray];
                            nextBoard[i] = movingPiece; nextBoard[selectedSquare] = '.';
                            
                            // Handle simple automatic Queening Promotion
                            if (movingPiece === 'P' && Math.floor(i / 8) === 0) nextBoard[i] = 'Q';
                            if (movingPiece === 'p' && Math.floor(i / 8) === 7) nextBoard[i] = 'q';

                            selectedSquare = null; validDestinations = [];
                            
                            const kingWin = checkKingMissing(nextBoard);
                            if (kingWin) {
                                update(ref(db, `matches/${matchId}`), { chessBoard: nextBoard, state: "chesswin", chessWinner: kingWin });
                            } else {
                                let nextTurn = isWhiteTurn ? "p2" : "p1";
                                update(ref(db, `matches/${matchId}`), {
                                    chessBoard: nextBoard, chessTurn: nextTurn, state: "chessvisualdelay",
                                    historyBoard: boardArray 
                                });
                            }
                        } else {
                            if ((isWhiteTurn && isWhitePiece(cell)) || (!isWhiteTurn && isBlackPiece(cell))) {
                                selectedSquare = i; validDestinations = generateValidMoves(i, boardArray);
                                renderChessBoard(boardArray, true);
                            }
                        }
                    };
                }
                chessBoardDisplay.appendChild(sq);
            });
        }

        function checkC4Win(board) {
            for (let r = 0; r < 6; r++) { for (let c = 0; c < 4; c++) { let i = r * 7 + c; if (board[i] && board[i] !== "empty" && board[i] === board[i+1] && board[i] === board[i+2] && board[i] === board[i+3]) return { winner: board[i], indices: [i, i+1, i+2, i+3] }; } }
            for (let r = 0; r < 3; r++) { for (let c = 0; c < 7; c++) { let i = r * 7 + c; if (board[i] && board[i] !== "empty" && board[i] === board[i+7] && board[i] === board[i+14] && board[i] === board[i+21]) return { winner: board[i], indices: [i, i+7, i+14, i+21] }; } }
            for (let r = 0; r < 3; r++) { for (let c = 0; c < 4; c++) { let i = r * 7 + c; if (board[i] && board[i] !== "empty" && board[i] === board[i+8] && board[i] === board[i+16] && board[i] === board[i+24]) return { winner: board[i], indices: [i, i+8, i+16, i+24] }; } }
            for (let r = 0; r < 3; r++) { for (let c = 3; c < 7; c++) { let i = r * 7 + c; if (board[i] && board[i] !== "empty" && board[i] === board[i+6] && board[i] === board[i+12] && board[i] === board[i+18]) return { winner: board[i], indices: [i, i+6, i+12, i+18] }; } }
            return null;
        }

        function renderC4Board(boardArray, interactive, winIndices = []) {
            c4BoardDisplay.innerHTML = "";
            boardArray.forEach((cell, i) => {
                const slot = document.createElement("div"); slot.className = "c4-slot " + cell;
                if (cell === "empty") slot.classList.add("empty");
                if (winIndices && winIndices.includes(i)) slot.classList.add("winning-highlight");
                
                if (interactive && cell === "empty") {
                    slot.onclick = () => {
                        const col = i % 7; let targetIndex = -1;
                        for (let row = 5; row >= 0; row--) { let idx = row * 7 + col; if (boardArray[idx] === "empty") { targetIndex = idx; break; } }
                        if (targetIndex !== -1) {
                            const updatedBoard = [...boardArray]; updatedBoard[targetIndex] = playerRole;
                            const winData = checkC4Win(updatedBoard);
                            if (winData) {
                                update(ref(db, `matches/${matchId}`), { c4Board: updatedBoard, state: "c4win", c4Winner: winData.winner, winningCells: winData.indices });
                            } else {
                                update(ref(db, `matches/${matchId}`), { c4Board: updatedBoard, c4Turn: (playerRole === "p1" ? "p2" : "p1"), state: "c4visualdelay" });
                            }
                        }
                    };
                }
                c4BoardDisplay.appendChild(slot);
            });
        }

        function initMatch() {
            off(ref(db, "matches")); onDisconnect(ref(db, `matches/${matchId}`)).remove();
            lobbyScreen.classList.add("hidden"); gameScreen.classList.remove("hidden");
            renderVoteInterfaces(null, null, null);

            currentMatchListener = onValue(ref(db, `matches/${matchId}`), (snap) => {
                const data = snap.val(); if (!data) { handleDisconnection(); return; }

                const currentStreak = data.streak || 0;
                const activeMode = data.currentMode || "Classic";
                const activeDuration = data.customDuration || 30;
                streakBadge.innerText = `🔥 Streak: ${currentStreak}`; modeBadge.innerText = activeMode;

                if (activeMode.startsWith("Normal ")) {
                    bannerThemeInfo.classList.add("hidden"); streakBadge.classList.add("hidden");
                } else {
                    bannerThemeInfo.classList.remove("hidden"); streakBadge.classList.remove("hidden");
                    if (activeMode === "Mystery" && data.state === "typing") themeText.innerText = "❓ MYSTERY (No Clues!)";
                    else themeText.innerText = data.currentTheme;
                }

                renderVoteInterfaces(data.votes, data.modeVotes, data.timeVotes);

                // Word Match Evaluator
                if (data.answers?.p1 && data.answers?.p2) {
                    clearInterval(timerInterval); let syncString = "";
                    if (data.answers.p1 === data.answers.p2 && data.answers.p1 !== "[nothing]") {
                        syncString = `🎉 MIND SYNCED! Both typed: "${data.answers.p1.toUpperCase()}"!`;
                        if (playerRole === "p1" && !["c4play","c4visualdelay","c4win","chessplay","chessvisualdelay","chesswin","resetting"].includes(data.state)) {
                            if (activeMode === "Connect 4") {
                                update(ref(db, `matches/${matchId}`), { state: "c4play", streak: currentStreak + 1, answers: null, lastSyncResult: syncString });
                            } else if (activeMode === "Chess") {
                                update(ref(db, `matches/${matchId}`), { state: "chessplay", chessMovesLeft: 10, streak: currentStreak + 1, answers: null, lastSyncResult: syncString });
                            } else {
                                update(ref(db, `matches/${matchId}`), { state: "resetting", streak: currentStreak + 1, lastSyncResult: syncString });
                                setTimeout(() => {
                                    update(ref(db, `matches/${matchId}`), { 
                                        state: "voting", currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)], 
                                        p1Ready: false, p2Ready: false, answers: null, votes: null, modeVotes: null, timeVotes: null
                                    });
                                }, 4000);
                            }
                        }
                    } else {
                        syncString = `❌ Miss! P1: "${data.answers.p1}" | P2: "${data.answers.p2}". Retrying...`;
                        if (playerRole === "p1" && !["c4play","c4visualdelay","c4win","chessplay","chessvisualdelay","chesswin","resetting"].includes(data.state)) {
                            update(ref(db, `matches/${matchId}`), { state: "resetting", streak: 0, lastSyncResult: syncString });
                            setTimeout(() => {
                                const randomTheme = ["Connect 4", "Chess"].includes(activeMode) ? THEMES[Math.floor(Math.random() * THEMES.length)] : data.currentTheme;
                                update(ref(db, `matches/${matchId}`), { state: "waiting", p1Ready: false, p2Ready: false, answers: null, currentTheme: randomTheme });
                            }, 4000);
                        }
                    }
                    resultAlert.innerHTML = syncString; return; 
                }

                if (data.state === "voting" || data.state === "waiting") hasSubmitted = false;

                // Voting Filter Logic
                if (data.state === "voting") {
                    const currentModeVote = data.modeVotes?.[playerRole];
                    if (currentModeVote && currentModeVote.startsWith("Normal ")) {
                        timerSectionTitle.classList.add("hidden"); timesGrid.classList.add("hidden");
                        themeSectionTitle.classList.add("hidden"); themesGrid.classList.add("hidden");
                    } else {
                        timerSectionTitle.classList.remove("hidden"); timesGrid.classList.remove("hidden");
                        themeSectionTitle.classList.remove("hidden"); themesGrid.classList.remove("hidden");
                    }

                    if (data.modeVotes?.p1 && data.modeVotes?.p2) {
                        let chosenMode = data.modeVotes.p1 === data.modeVotes.p2 ? data.modeVotes.p1 : (Math.random() > 0.5 ? data.modeVotes.p1 : data.modeVotes.p2);
                        if (chosenMode.startsWith("Normal ")) {
                            if (playerRole === "p1") {
                                if (chosenMode === "Normal Connect 4") {
                                    update(ref(db, `matches/${matchId}`), { currentMode: chosenMode, state: "c4play", votes: null, modeVotes: null, timeVotes: null, c4Board: Array(42).fill("empty"), c4Turn: "p1", lastSyncResult: "" });
                                } else if (chosenMode === "Normal Chess") {
                                    update(ref(db, `matches/${matchId}`), { currentMode: chosenMode, state: "chessplay", votes: null, modeVotes: null, timeVotes: null, chessBoard: INITIAL_CHESS, chessTurn: "p1", chessMovesLeft: 9999, lastSyncResult: "" });
                                }
                            }
                            return;
                        } else if (data.votes?.p1 && data.votes?.p2 && data.timeVotes?.p1 && data.timeVotes?.p2) {
                            if (playerRole === "p1") {
                                let chosenTheme = data.votes.p1 === data.votes.p2 ? data.votes.p1 : (Math.random() > 0.5 ? data.votes.p1 : data.votes.p2);
                                let chosenTime = data.timeVotes.p1 === data.timeVotes.p2 ? data.timeVotes.p1 : (Math.random() > 0.5 ? data.timeVotes.p1 : data.timeVotes.p2);
                                update(ref(db, `matches/${matchId}`), { currentTheme: chosenTheme, currentMode: chosenMode, customDuration: chosenTime, state: "waiting", votes: null, modeVotes: null, timeVotes: null, lastSyncResult: "" });
                            }
                            return;
                        }
                    }
                }

                // Layout Router
                if (data.state === "voting") {
                    resultAlert.innerText = "🗳️ Vote for configuration options!";
                    votingArea.classList.remove("hidden"); readyArea.classList.add("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.add("hidden"); chessArea.classList.add("hidden");
                }
                if (data.state === "waiting") {
                    votingArea.classList.add("hidden"); readyArea.classList.remove("hidden"); readyBtn.classList.remove("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.add("hidden"); chessArea.classList.add("hidden");
                    const myReadyStatus = data[`${playerRole}Ready`]; readyBtn.disabled = myReadyStatus;
                    statusMsg.innerText = myReadyStatus ? "Waiting for partner..." : `Ready up! Timer set to: ${activeDuration}s`;
                    if (data.lastSyncResult) resultAlert.innerHTML = data.lastSyncResult; else resultAlert.innerText = "⏳ Awaiting matching confirmations.";
                    if (data.p1Ready && data.p2Ready && playerRole === "p1") runSyncTimer(activeMode === "Lightning" ? 10 : activeDuration);
                }
                if (data.state === "typing") {
                    votingArea.classList.add("hidden"); readyArea.classList.add("hidden"); typingArea.classList.remove("hidden"); timerContainer.classList.remove("hidden"); c4Area.classList.add("hidden"); chessArea.classList.add("hidden");
                    timerText.innerText = data.timer ?? activeDuration; resultAlert.innerText = "🧠 Enter your matching word now!";
                    if (data.timer === 0 && !hasSubmitted) evaluateRound();
                }

                // Connect 4 Views
                if (data.state === "c4play") {
                    votingArea.classList.add("hidden"); readyArea.classList.add("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.remove("hidden"); chessArea.classList.add("hidden");
                    const isMyTurn = data.c4Turn === playerRole; c4Status.innerText = isMyTurn ? "🟢 YOUR TURN! Drop a piece." : "🔴 Opponent's turn to drop...";
                    resultAlert.innerText = activeMode === "Normal Connect 4" ? "🎮 Mode: Normal Connect 4" : data.lastSyncResult;
                    renderC4Board(data.c4Board, isMyTurn);
                }
                if (data.state === "c4visualdelay") {
                    votingArea.classList.add("hidden"); readyArea.classList.add("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.remove("hidden"); chessArea.classList.add("hidden");
                    renderC4Board(data.c4Board, false);
                    if (!window.c4CountdownInterval) {
                        let localTimeLeft = 1.3;
                        window.c4CountdownInterval = setInterval(() => {
                            localTimeLeft -= 0.1;
                            if (localTimeLeft <= 0) { clearInterval(window.c4CountdownInterval); window.c4CountdownInterval = null; }
                            else c4Status.innerText = `⏳ Syncing next moves... (${localTimeLeft.toFixed(1)}s)`;
                        }, 100);
                    }
                    if (playerRole === "p1" && !window.c4DelayTimeout) {
                        window.c4DelayTimeout = setTimeout(() => {
                            if (activeMode === "Normal Connect 4") { update(ref(db, `matches/${matchId}`), { state: "c4play" }); }
                            else { update(ref(db, `matches/${matchId}`), { state: "waiting", p1Ready: false, p2Ready: false, answers: null, currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)] }); }
                            window.c4DelayTimeout = null;
                        }, 1300);
                    }
                }
                if (data.state === "c4win") {
                    votingArea.classList.add("hidden"); readyArea.classList.add("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.remove("hidden"); chessArea.classList.add("hidden");
                    renderC4Board(data.c4Board, false, data.winningCells || []);
                    resultAlert.innerText = data.c4Winner === playerRole ? "🎉 CONNECT 4 VICTORY! YOU WIN!" : "💀 MATCH OVER! OPPONENT WON!";
                    if (!window.c4CountdownInterval) {
                        let winCountdownLeft = 5.0;
                        window.c4CountdownInterval = setInterval(() => {
                            winCountdownLeft -= 0.1;
                            if (winCountdownLeft <= 0) { clearInterval(window.c4CountdownInterval); window.c4CountdownInterval = null; }
                            else c4Status.innerText = `Lobby return in (${Math.max(0, winCountdownLeft).toFixed(1)}s)`;
                        }, 100);
                    }
                    if (playerRole === "p1" && !window.c4DelayTimeout) {
                        window.c4DelayTimeout = setTimeout(() => {
                            update(ref(db, `matches/${matchId}`), { state: "voting", currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)], p1Ready: false, p2Ready: false, answers: null, votes: null, modeVotes: null, timeVotes: null, c4Board: Array(42).fill("empty"), c4Turn: "p1", streak: 0, lastSyncResult: "", winningCells: null, c4Winner: null });
                            window.c4DelayTimeout = null;
                        }, 5000);
                    }
                }

                // Chess Handling Views
                if (data.state === "chessplay") {
                    votingArea.classList.add("hidden"); readyArea.classList.add("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.add("hidden"); chessArea.classList.remove("hidden");
                    
                    const isMyTurn = data.chessTurn === playerRole;
                    const movesLeft = data.chessMovesLeft || 0;
                    
                    if (activeMode === "Normal Chess") {
                        chessStatus.innerText = isMyTurn ? "🟢 YOUR TURN! Make a chess move." : "🔴 Opponent's turn to move piece...";
                        resultAlert.innerText = "🎮 Mode: Normal turn-based Chess";
                    } else {
                        chessStatus.innerText = isMyTurn ? `🟢 YOUR TURN! [${movesLeft} group match moves remaining]` : `🔴 Opponent's turn... [${movesLeft} group match moves remaining]`;
                        resultAlert.innerText = data.lastSyncResult;
                    }

                    // Handle Undo visibility mechanics
                    if (data.undoRequested && data.undoRequested !== playerRole) {
                        chessGrantUndoBtn.classList.remove("hidden");
                        chessUndoBtn.classList.add("hidden");
                    } else {
                        chessGrantUndoBtn.classList.add("hidden");
                        chessUndoBtn.classList.remove("hidden");
                        chessUndoBtn.disabled = (data.undoRequested === playerRole);
                        chessUndoBtn.innerText = data.undoRequested === playerRole ? "Awaiting Choice..." : "Request Undo";
                    }

                    renderChessBoard(data.chessBoard, isMyTurn);
                }
                if (data.state === "chessvisualdelay") {
                    votingArea.classList.add("hidden"); readyArea.classList.add("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.add("hidden"); chessArea.classList.remove("hidden");
                    renderChessBoard(data.chessBoard, false);

                    if (!window.chessCountdownInterval) {
                        let localChessTime = 0.3;
                        window.chessCountdownInterval = setInterval(() => {
                            localChessTime -= 0.1;
                            if (localChessTime <= 0) { clearInterval(window.chessCountdownInterval); window.chessCountdownInterval = null; }
                            else chessStatus.innerText = `⏳ Recording piece movement... (${Math.max(0, localChessTime).toFixed(1)}s)`;
                        }, 100);
                    }

                    if (playerRole === "p1" && !window.chessDelayTimeout) {
                        window.chessDelayTimeout = setTimeout(() => {
                            const nextMovesCount = (activeMode === "Normal Chess") ? 9999 : (data.chessMovesLeft - 1);
                            if (nextMovesCount <= 0) {
                                update(ref(db, `matches/${matchId}`), { state: "waiting", chessMovesLeft: 0, p1Ready: false, p2Ready: false, answers: null, currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)] });
                            } else {
                                update(ref(db, `matches/${matchId}`), { state: "chessplay", chessMovesLeft: nextMovesCount });
                            }
                            window.chessDelayTimeout = null;
                        }, 300);
                    }
                }
                if (data.state === "chesswin") {
                    votingArea.classList.add("hidden"); readyArea.classList.add("hidden"); typingArea.classList.add("hidden"); timerContainer.classList.add("hidden"); c4Area.classList.add("hidden"); chessArea.classList.remove("hidden");
                    renderChessBoard(data.chessBoard, false);
                    
                    resultAlert.innerText = data.chessWinner === playerRole ? "🎉 CHESS CHECKMATE VICTORY! YOU WIN!" : "💀 CHECKMATE! YOU LOSE!";
                    if (!window.chessCountdownInterval) {
                        let winChessTime = 5.0;
                        window.chessCountdownInterval = setInterval(() => {
                            winChessTime -= 0.1;
                            if (winChessTime <= 0) { clearInterval(window.chessCountdownInterval); window.chessCountdownInterval = null; }
                            else chessStatus.innerText = `Returning to setup lobby... (${Math.max(0, winChessTime).toFixed(1)}s)`;
                        }, 100);
                    }
                    if (playerRole === "p1" && !window.chessDelayTimeout) {
                        window.chessDelayTimeout = setTimeout(() => {
                            update(ref(db, `matches/${matchId}`), { state: "voting", currentTheme: THEMES[Math.floor(Math.random() * THEMES.length)], p1Ready: false, p2Ready: false, answers: null, votes: null, modeVotes: null, timeVotes: null, c4Board: Array(42).fill("empty"), c4Turn: "p1", chessBoard: INITIAL_CHESS, chessTurn: "p1", chessMovesLeft: 0, undoRequested: "", streak: 0, lastSyncResult: "", chessWinner: null });
                            window.chessDelayTimeout = null;
                        }, 5000);
                    }
                }
            });

            // Chat engine
            onValue(ref(db, `matches/${matchId}/chat`), (snap) => {
                chatBox.innerHTML = ""; const messages = snap.val();
                if (messages) {
                    Object.values(messages).forEach(m => {
                        const isEmote = m.msg.startsWith("[react]"); const cleanMsg = isEmote ? m.msg.replace("[react]", "") : m.msg;
                        let bubbleClass = m.sys ? "sys" : (m.uid === playerId ? "me" : "them"); if(isEmote) bubbleClass += " react";
                        const msgDiv = document.createElement("div"); msgDiv.className = `bubble ${bubbleClass}`; msgDiv.innerText = cleanMsg; chatBox.appendChild(msgDiv);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        // Action Handlers
        chessUndoBtn.onclick = () => { update(ref(db, `matches/${matchId}`), { undoRequested: playerRole }); };
        chessGrantUndoBtn.onclick = () => {
            onValue(ref(db, `matches/${matchId}`), (snap) => {
                const data = snap.val();
                if (data && data.historyBoard) {
                    let previousTurn = data.chessTurn === "p1" ? "p2" : "p1";
                    let currentMovesCount = data.chessMovesLeft;
                    let calculatedMoves = (data.currentMode === "Normal Chess") ? 9999 : (currentMovesCount + 1);
                    
                    off(ref(db, `matches/${matchId}/historyBoard`));
                    update(ref(db, `matches/${matchId}`), {
                        chessBoard: data.historyBoard, chessTurn: previousTurn,
                        chessMovesLeft: calculatedMoves, undoRequested: "", historyBoard: null,
                        state: "chessplay"
                    });
                }
            }, { onlyOnce: true });
        };
        chessResignBtn.onclick = () => {
            let opponentRole = playerRole === "p1" ? "p2" : "p1";
            update(ref(db, `matches/${matchId}`), { state: "chesswin", chessWinner: opponentRole });
        };

        readyBtn.onclick = () => { const upd = {}; upd[`${playerRole}Ready`] = true; upd["lastSyncResult"] = ""; update(ref(db, `matches/${matchId}`), upd); };

        function runSyncTimer(duration) {
            let count = duration; update(ref(db, `matches/${matchId}`), { state: "typing", timer: count });
            timerInterval = setInterval(() => { count--; if (count >= 0) { update(ref(db, `matches/${matchId}`), { timer: count }); } else { clearInterval(timerInterval); } }, 1000);
        }

        function evaluateRound() {
            hasSubmitted = true; const typedVal = wordInput.value.trim().toLowerCase() || "[nothing]";
            wordInput.value = ""; wordInput.blur(); set(ref(db, `matches/${matchId}/answers/${playerRole}`), typedVal);
        }

        function handleDisconnection() {
            clearInterval(timerInterval); if (currentMatchListener) off(ref(db, `matches/${matchId}`));
            resultAlert.innerText = "⚠️ Connection lost or partner left! Reloading..."; setTimeout(() => location.reload(), 2000);
        }

        document.querySelectorAll(".react-btn").forEach(btn => {
            btn.onclick = () => { const emo = btn.getAttribute("data-emoji"); push(ref(db, `matches/${matchId}/chat`), { uid: playerId, msg: `[react]${emo}`, sys: false }); };
        });
        sendChatBtn.onclick = postChat; chatInput.onkeypress = (e) => { if (e.key === "Enter") postChat(); };
        function postChat() { const m = chatInput.value.trim(); if(!m) return; push(ref(db, `matches/${matchId}/chat`), { uid: playerId, msg: m, sys: false }); chatInput.value = ""; }
    </script>
</body>
</html>
